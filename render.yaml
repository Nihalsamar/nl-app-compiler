# One-click deploy on Render (https://render.com).
# After connecting the repo, set NVIDIA_API_KEY in the dashboard (sync:false
# keeps the secret out of git).
services:
  - type: web
    name: nl-app-compiler
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: nvidia
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: LLM_TEMPERATURE
        value: "0"
      - key: LLM_MAX_TOKENS
        value: "4096"
